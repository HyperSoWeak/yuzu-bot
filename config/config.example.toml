# Yuzu bot configuration — non-sensitive settings.
# Sensitive values (tokens, DB URLs) belong in .env, not here.

[bot]
# Default command prefix for replies / branding; not used for slash commands.
name = "Yuzu"
# GitHub repo url shown by /changelog and /info.
github_url = "https://github.com/HyperSoWeak/yuzu-bot"

[command]
# Default per-user per-command cooldown in seconds; commands may override.
default_cooldown_seconds = 3

# Keyword groups — triggers are case-insensitive regex patterns.
# STAT groups increment a per-user counter; REPLY groups only send replies.
# Template variables: {name} {mention} {username} and {count} (STAT only).
# Use {{ and }} to write a literal brace.
#
# [[keyword.group]]
# name = "breakdown"
# kind = "STAT"
# triggers = ["破防", "破大防", "破.{0,2}防"]
# replies = [
#   "破防警報！{name}，這是第 {count} 次了，你是不是太容易破防了？",
# ]

[achievement]
# When true, announce new achievements to the configured guild channel.
announce_enabled = true

# Achievement definitions — loaded at startup; no DB table required.
# rule_type "stat_threshold": fires when a user's stat reaches the given threshold.
#   rule_config: { stat_key = "<stat name>", threshold = <integer> }
#
# [[achievement.definition]]
# key = "breakdown_count_1"
# name = "破防 1"
# description = "累積說過 1 次破防關鍵字。"
# rule_type = "stat_threshold"
# rule_config = { stat_key = "breakdown", threshold = 1 }

[color_role]
# Prefix for role names Yuzu manages (helps humans identify them).
role_name_prefix = "color:"
