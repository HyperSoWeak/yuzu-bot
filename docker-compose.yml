name: yuzu

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yuzu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yuzu}
      POSTGRES_DB: ${POSTGRES_DB:-yuzu}
    ports:
      # Bind to loopback only — safe for dev, not exposed to LAN.
      - '127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-yuzu} -d ${POSTGRES_DB:-yuzu}']
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-yuzu}:${POSTGRES_PASSWORD:-yuzu}@postgres:5432/${POSTGRES_DB:-yuzu}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_OWNER_IDS: ${DISCORD_OWNER_IDS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    volumes:
      - ./config:/app/config:ro

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-yuzu}
      PGPASSWORD: ${POSTGRES_PASSWORD:-yuzu}
      PGDATABASE: ${POSTGRES_DB:-yuzu}
      BACKUP_RETENTION_DAYS: '7'
    volumes:
      - ${BACKUP_DIR:-./backups}:/backups
      - ./docker/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        apk add --no-cache dcron tzdata >/dev/null
        chmod +x /usr/local/bin/backup.sh
        echo "0 3 * * * /usr/local/bin/backup.sh >> /var/log/backup.log 2>&1" > /etc/crontabs/root
        crond -f -l 8

volumes:
  postgres-data:
